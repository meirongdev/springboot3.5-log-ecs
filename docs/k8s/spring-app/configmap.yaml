---
# Spring Boot application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: spring-app-config
  namespace: logging
  labels:
    app: spring-app
data:
  application.yaml: |
    spring:
      application:
        name: spring-log-demo
      threads:
        virtual:
          enabled: true   # Java 25 Virtual Threads

    server:
      port: 8080

    management:
      endpoints:
        web:
          exposure:
            include: health,info,metrics,loggers
      endpoint:
        health:
          show-details: always

    # ECS structured logging configuration
    logging:
      structured:
        format:
          console: ecs
          file: ecs
        ecs:
          service:
            name: spring-log-demo
            version: "1.0.0"
            environment: demo
            node:
              name: ${HOSTNAME:unknown}
      file:
        name: /logs/app.log

---
# Logback configuration for rolling file + ECS format
apiVersion: v1
kind: ConfigMap
metadata:
  name: spring-app-logback
  namespace: logging
  labels:
    app: spring-app
data:
  logback-spring.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <configuration>
      <!-- Spring Boot 3.5 built-in ECS structured appenders -->
      <include resource="org/springframework/boot/logging/logback/structured-console-appender.xml"/>
      <include resource="org/springframework/boot/logging/logback/structured-file-appender.xml"/>

      <!-- Async wrapper: queueSize=1024, discardingThreshold=0 for virtual threads -->
      <appender name="ASYNC" class="ch.qos.logback.classic.AsyncAppender">
        <queueSize>1024</queueSize>
        <discardingThreshold>0</discardingThreshold>
        <includeCallerData>false</includeCallerData>
        <appender-ref ref="CONSOLE"/>
        <appender-ref ref="FILE"/>
      </appender>

      <root level="INFO">
        <appender-ref ref="ASYNC"/>
      </root>
    </configuration>

---
# Filebeat sidecar configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: filebeat-config
  namespace: logging
  labels:
    app: spring-app
data:
  filebeat.yaml: |
    filebeat.inputs:
      - type: filestream
        id: spring-app-logs
        enabled: true
        paths:
          - /logs/app.log
          - /logs/app.*.log.gz
        parsers:
          - ndjson:
              target: ""           # merge JSON fields to root level
              add_error_key: true
              overwrite_keys: true
        # Tag so Logstash can route by source
        tags: ["spring-app", "ecs"]

    # Add Kubernetes pod metadata to every event
    processors:
      - add_kubernetes_metadata:
          host: ${NODE_NAME}
          matchers:
            - logs_path:
                logs_path: /logs/

    output:
      elasticsearch:
        hosts: ["http://opensearch:9200"]
        # Daily index
        index: "spring-logs-%{+yyyy.MM.dd}"
        # Retry on transient failures
        protocol: "http"
        # Disable index template management (OpenSearch handles this)
        enabled: false

    # Disable template setup since we're using OpenSearch
    setup.template.enabled: false
    setup.ilm.enabled: false

    logging.level: info
    logging.to_files: false   # Filebeat logs to stdout only
