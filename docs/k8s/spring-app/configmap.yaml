---
# Spring Boot application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: spring-app-config
  namespace: logging
  labels:
    app: spring-app
data:
  application.yaml: |
    spring:
      application:
        name: spring-log-demo
      threads:
        virtual:
          enabled: true   # Java 25 Virtual Threads

    server:
      port: 8080

    management:
      endpoints:
        web:
          exposure:
            include: health,info,metrics,loggers
      endpoint:
        health:
          show-details: always

    # ECS structured logging configuration
    logging:
      config: file:/config-logback/logback-spring.xml
      structured:
        format:
          console: ecs
          file: ecs
        ecs:
          service:
            name: spring-log-demo
            version: "1.0.0"
            environment: demo
            node:
              name: ${HOSTNAME:unknown}
      file:
        name: /logs/app.log

---
# Logback configuration for rolling file + ECS format
apiVersion: v1
kind: ConfigMap
metadata:
  name: spring-app-logback
  namespace: logging
  labels:
    app: spring-app
data:
  logback-spring.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <configuration>
      <!-- CONSOLE: ECS structured JSON via Spring Boot's formatter -->
      <appender name="CONSOLE" class="ch.qos.logback.core.ConsoleAppender">
        <encoder class="org.springframework.boot.logging.logback.StructuredLogEncoder">
          <format>ecs</format>
        </encoder>
      </appender>

      <!-- FILE: ECS structured JSON with rolling -->
      <appender name="FILE" class="ch.qos.logback.core.rolling.RollingFileAppender">
        <file>${LOG_FILE:-/logs/app.log}</file>
        <rollingPolicy class="ch.qos.logback.core.rolling.SizeAndTimeBasedRollingPolicy">
          <fileNamePattern>/logs/app.%d{yyyy-MM-dd}.%i.log.gz</fileNamePattern>
          <maxFileSize>100MB</maxFileSize>
          <maxHistory>7</maxHistory>
          <totalSizeCap>1GB</totalSizeCap>
        </rollingPolicy>
        <encoder class="org.springframework.boot.logging.logback.StructuredLogEncoder">
          <format>ecs</format>
        </encoder>
      </appender>

      <!-- Async wrappers for virtual-thread safety -->
      <appender name="ASYNC_CONSOLE" class="ch.qos.logback.classic.AsyncAppender">
        <queueSize>1024</queueSize>
        <discardingThreshold>0</discardingThreshold>
        <includeCallerData>false</includeCallerData>
        <appender-ref ref="CONSOLE"/>
      </appender>
      <appender name="ASYNC_FILE" class="ch.qos.logback.classic.AsyncAppender">
        <queueSize>1024</queueSize>
        <discardingThreshold>0</discardingThreshold>
        <includeCallerData>false</includeCallerData>
        <appender-ref ref="FILE"/>
      </appender>

      <root level="INFO">
        <appender-ref ref="ASYNC_CONSOLE"/>
        <appender-ref ref="ASYNC_FILE"/>
      </root>
    </configuration>

---
# Filebeat sidecar configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: filebeat-config
  namespace: logging
  labels:
    app: spring-app
data:
  filebeat.yaml: |
    filebeat.inputs:
      - type: filestream
        id: spring-app-logs
        enabled: true
        paths:
          - /logs/app.log
          - /logs/app.*.log.gz
        parsers:
          - ndjson:
              target: ""           # merge JSON fields to root level
              add_error_key: true
              overwrite_keys: true
        # Tag so Logstash can route by source
        tags: ["spring-app", "ecs"]

    # Add Kubernetes pod metadata to every event
    processors:
      - add_kubernetes_metadata:
          host: ${NODE_NAME}
          matchers:
            - logs_path:
                logs_path: /logs/

    # Ship logs to Logstash (which forwards to OpenSearch)
    output.logstash:
      hosts: ["logstash:5044"]
      # Compression for performance
      compression_level: 3

    # Disable template setup since Logstash/OpenSearch handles this
    setup.template.enabled: false
    setup.ilm.enabled: false

    logging.level: info
    logging.to_files: false   # Filebeat logs to stdout only
