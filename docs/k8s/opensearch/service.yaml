apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: logging
  labels:
    app: opensearch
    app.kubernetes.io/part-of: log-demo
spec:
  selector:
    app: opensearch
  ports:
    - name: http
      port: 9200
      targetPort: 9200
      protocol: TCP
      nodePort: 30200
    - name: transport
      port: 9300
      targetPort: 9300
      protocol: TCP
  type: NodePort
