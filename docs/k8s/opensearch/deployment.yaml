apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch
  namespace: logging
  labels:
    app: opensearch
    app.kubernetes.io/part-of: log-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opensearch
  template:
    metadata:
      labels:
        app: opensearch
    spec:
      # Required: OpenSearch needs vm.max_map_count >= 262144
      initContainers:
        - name: sysctl
          image: busybox:1.36
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
          securityContext:
            privileged: true

      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2.19.0
          ports:
            - name: http
              containerPort: 9200
            - name: transport
              containerPort: 9300
          env:
            # Single-node mode (demo only)
            - name: discovery.type
              value: single-node
            # Disable TLS for demo simplicity — DO NOT use in production
            - name: plugins.security.disabled
              value: "true"
            # Disable security demo configuration for simplicity
            - name: DISABLE_INSTALL_DEMO_CONFIG
              value: "true"
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
            - name: bootstrap.memory_lock
              value: "false"
            - name: cluster.name
              value: log-demo-cluster
            - name: node.name
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: opensearch-data
              mountPath: /usr/share/opensearch/data
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 1.5Gi
          readinessProbe:
            httpGet:
              path: /_cluster/health?wait_for_status=yellow&timeout=5s
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5

      volumes:
        - name: opensearch-data
          # emptyDir for demo — use PersistentVolumeClaim in production
          emptyDir: {}
